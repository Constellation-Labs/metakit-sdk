name: Release Rust SDK

on:
  push:
    tags:
      - 'rust-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/rust/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('packages/rust/Cargo.lock') }}

      - name: Check formatting
        working-directory: packages/rust
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        working-directory: packages/rust
        run: cargo clippy --all-features -- -D warnings

      - name: Test (default features)
        working-directory: packages/rust
        run: cargo test

      - name: Test (all features)
        working-directory: packages/rust
        run: cargo test --all-features

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#rust-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/rust
        run: |
          PACKAGE_VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          if [[ "$PACKAGE_VERSION" != "${{ steps.version.outputs.version }}" ]]; then
            echo "::error::Package version ($PACKAGE_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Verify package builds
        working-directory: packages/rust
        run: cargo publish --dry-run --allow-dirty

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: packages/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: cargo publish

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: Rust SDK v${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
