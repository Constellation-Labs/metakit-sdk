name: Release

# Unified SDK release: one tag publishes all three language SDKs at the same
# version — TypeScript (3 packages) to npm, Rust (3 crates) to crates.io, and
# Python (1 package) to PyPI. See docs/RELEASING.md for the full flow (naming
# decision, secrets, tag policy).
#
# Tag format: vX.Y.Z or vX.Y.Z-rc.N (plain SemVer, no build metadata — npm and
# crates.io both mishandle `+meta`). PyPI normalizes the artifact to the PEP 440
# spelling (1.8.0-rc.1 -> 1.8.0rc1); the manifest keeps the SemVer string so the
# version gate matches the tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write # npm --provenance + PyPI Trusted Publisher (OIDC)

env:
  # Crate directories in dependency order (dependencies before dependents).
  # The crate *names* are read from each Cargo.toml at runtime, so renaming a
  # crate (e.g. jlvm-core -> constellation-jlvm-core, see docs/RELEASING.md
  # step zero) requires no workflow changes.
  CRATE_DIRS: rust/poseidon-bn254 rust/jlvm-core packages/rust
  # npm package dirs in dependency order (metagraph-sdk depends on metagraph-sdk-core).
  NPM_PACKAGE_DIRS: packages/typescript-core packages/typescript-jlvm packages/typescript
  # Python package dir (one metagraph-sdk-level package: kernel + network, no JLVM).
  PYTHON_PACKAGE_DIRS: packages/python

jobs:
  # Derive the version from the tag and require every publishable manifest to
  # already carry it. No auto-rewrite: a mismatch fails the release with a
  # clear message and you fix the manifests in a PR, then re-tag.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' is not vX.Y.Z or vX.Y.Z-PRERELEASE (build metadata is not allowed; see docs/RELEASING.md)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify manifest versions match the tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          fail=0

          for dir in $NPM_PACKAGE_DIRS; do
            PKG_VERSION=$(node -p "require('./$dir/package.json').version")
            if [[ "$PKG_VERSION" != "$VERSION" ]]; then
              echo "::error file=$dir/package.json::npm package version ($PKG_VERSION) does not match tag version ($VERSION). Bump it in a PR before tagging — the release workflow never rewrites versions."
              fail=1
            fi
          done

          for dir in $CRATE_DIRS; do
            CRATE_VERSION=$(grep -m1 '^version' "$dir/Cargo.toml" | sed -E 's/version *= *"(.*)"/\1/')
            if [[ "$CRATE_VERSION" != "$VERSION" ]]; then
              echo "::error file=$dir/Cargo.toml::crate version ($CRATE_VERSION) does not match tag version ($VERSION). Bump it in a PR before tagging — the release workflow never rewrites versions."
              fail=1
            fi
          done

          # jlvm-core's path dep on poseidon-bn254 carries an explicit version
          # (required for the registry rewrite at publish time); keep it in
          # lock-step too so the published dep requirement is exact.
          DEP_VERSION=$(grep -m1 -E 'path *= *"\.\./poseidon-bn254"' rust/jlvm-core/Cargo.toml | sed -nE 's/.*version *= *"([^"]*)".*/\1/p')
          if [[ "$DEP_VERSION" != "$VERSION" ]]; then
            echo "::error file=rust/jlvm-core/Cargo.toml::poseidon path-dependency version ($DEP_VERSION) does not match tag version ($VERSION)."
            fail=1
          fi

          # Python keeps the SemVer string (e.g. 1.8.0-rc.1) in pyproject so this
          # gate matches the tag; the build normalizes the artifact to PEP 440
          # (1.8.0rc1) at publish time.
          for dir in $PYTHON_PACKAGE_DIRS; do
            PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('$dir/pyproject.toml','rb'))['project']['version'])")
            if [[ "$PKG_VERSION" != "$VERSION" ]]; then
              echo "::error file=$dir/pyproject.toml::Python package version ($PKG_VERSION) does not match tag version ($VERSION). Bump it in a PR before tagging — the release workflow never rewrites versions."
              fail=1
            fi
          done

          exit $fail

  npm-publish:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace
        run: npm ci

      # Build + test in dependency order (the workspaces array is core -> jlvm ->
      # metagraph-sdk; metagraph-sdk depends on metagraph-sdk-core).
      - name: Build (all workspaces, dep order)
        run: npm run build --workspaces

      - name: Test (all workspaces)
        run: npm test --workspaces

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; pin to latest. With a
      # configured npm trusted publisher + the workflow's `id-token: write`,
      # `npm publish` authenticates over OIDC (no NPM_TOKEN) and attaches
      # provenance automatically — so `--provenance` is no longer passed. Every
      # npm package must have a trusted publisher (this repo + release.yml).
      - name: Upgrade npm for trusted publishing (OIDC)
        run: npm install -g npm@latest

      # `npm publish --workspaces` publishes in the workspaces-array order
      # (core -> jlvm -> metagraph-sdk), so metagraph-sdk-core is on the registry
      # before metagraph-sdk (which depends on it) is published.
      #
      # Prereleases (1.8.0-rc.N) must NOT land on the `latest` dist-tag — npm
      # errors ("must specify a tag using --tag when publishing a prerelease")
      # rather than silently making an rc the default `npm install`. Route them
      # to the `next` channel; stable versions go to `latest`.
      - name: Publish all workspaces to npm
        env:
          VERSION: ${{ needs.version-check.outputs.version }}
        run: |
          EXTRA=""
          if [[ "$VERSION" == *-* ]]; then
            EXTRA="--tag next"
            echo "Prerelease $VERSION -> publishing under dist-tag 'next' (not 'latest')"
          fi
          npm publish --workspaces --access public $EXTRA

      - name: Summarize
        run: |
          echo "### npm" >> "$GITHUB_STEP_SUMMARY"
          for dir in $NPM_PACKAGE_DIRS; do
            NAME=$(node -p "require('./$dir/package.json').name")
            echo "- \`$NAME@${{ needs.version-check.outputs.version }}\` -> https://www.npmjs.com/package/$NAME" >> "$GITHUB_STEP_SUMMARY"
          done

  cargo-publish:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Trusted Publishing (OIDC): exchange the workflow's id-token for a
      # short-lived crates.io token (auto-revoked when the job ends). Each crate
      # must have a trusted publisher configured (this repo + release.yml) —
      # constellation-metagraph-sdk is already TP-only; poseidon-bn254 + jlvm
      # need a TP added now that they exist. OIDC cannot do a crate's first
      # publish, but all three crates already exist (the new two were
      # token-published in rc.2), so OIDC covers them from here on.
      - name: Authenticate to crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # Publish in dependency order. `cargo publish` (since 1.66) blocks until
      # the uploaded crate is visible in the sparse index, so each dependent's
      # verify build can resolve its just-published dependency. No --no-verify:
      # the full verify build is the point (metakit's Maven release once failed
      # on scaladoc only at publish time — catch the equivalent here, not after
      # half the crates are out).
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          echo "### crates.io" >> "$GITHUB_STEP_SUMMARY"
          for dir in $CRATE_DIRS; do
            NAME=$(grep -m1 '^name' "$dir/Cargo.toml" | sed -E 's/name *= *"(.*)"/\1/')
            echo "::group::cargo publish $NAME ($dir)"
            ( cd "$dir" && cargo publish )
            echo "::endgroup::"
            echo "- \`$NAME@${{ needs.version-check.outputs.version }}\` -> https://crates.io/crates/$NAME" >> "$GITHUB_STEP_SUMMARY"
          done

  pypi-publish:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/python/pyproject.toml

      - name: Install build + dev dependencies
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"

      # Test before publishing, mirroring the npm job's release-time backstop
      # (CI already runs the full lint/type/test matrix on every PR).
      - name: Test (pytest)
        working-directory: packages/python
        run: pytest

      - name: Build sdist + wheel
        working-directory: packages/python
        run: python -m build

      # Trusted Publisher (OIDC) — no token needed. The PyPI project must
      # authorize THIS workflow file (release.yml). A publisher scoped to the old
      # release-python.yml does NOT carry over — add a new pending/trusted
      # publisher for release.yml in the PyPI project settings before the first
      # unified tag (see docs/PUBLISHING.md).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/

      - name: Summarize
        run: |
          echo "### PyPI" >> "$GITHUB_STEP_SUMMARY"
          for dir in $PYTHON_PACKAGE_DIRS; do
            NAME=$(python3 -c "import tomllib; print(tomllib.load(open('$dir/pyproject.toml','rb'))['project']['name'])")
            echo "- \`$NAME@${{ needs.version-check.outputs.version }}\` -> https://pypi.org/project/$NAME/" >> "$GITHUB_STEP_SUMMARY"
          done

  release-summary:
    needs: [version-check, npm-publish, cargo-publish, pypi-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Job summary
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          {
            echo "## Released v$VERSION"
            echo ""
            echo "| Registry | Artifact |"
            echo "|---|---|"
            for dir in $NPM_PACKAGE_DIRS; do
              NPM_NAME=$(node -p "require('./$dir/package.json').name")
              echo "| npm | \`$NPM_NAME@$VERSION\` |"
            done
            for dir in $CRATE_DIRS; do
              NAME=$(grep -m1 '^name' "$dir/Cargo.toml" | sed -E 's/name *= *"(.*)"/\1/')
              echo "| crates.io | \`$NAME@$VERSION\` |"
            done
            for dir in $PYTHON_PACKAGE_DIRS; do
              NAME=$(python3 -c "import tomllib; print(tomllib.load(open('$dir/pyproject.toml','rb'))['project']['name'])")
              echo "| PyPI | \`$NAME@$VERSION\` |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      # Build a release BODY with direct links to every published artifact plus
      # a cross-link to the byte-compatible metakit (Scala) reference line. This
      # is what users read on the Releases page; `generate_release_notes: true`
      # appends the auto-generated merged-PR list AFTER this body. Package names
      # are read from the manifests (same pattern as the job summary above) so a
      # rename needs no change here. ubuntu-latest ships node + python3.
      - name: Build release notes body
        id: notes
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          MINOR_LINE="$(echo "$VERSION" | cut -d. -f1-2)" # e.g. 1.8
          BODY="$RUNNER_TEMP/RELEASE_BODY.md"
          {
            echo "Multi-language SDK for Constellation metagraphs, byte-compatible with the metakit (Scala) reference — the [\`io.constellationnetwork:metakit_2.13\`](https://central.sonatype.com/artifact/io.constellationnetwork/metakit_2.13) \`${MINOR_LINE}.x\` line."
            echo ""
            echo "### Published artifacts (all at \`$VERSION\`)"
            echo ""
            echo "| Registry | Package |"
            echo "|---|---|"
            for dir in $NPM_PACKAGE_DIRS; do
              NAME=$(node -p "require('./$dir/package.json').name")
              echo "| npm | [\`$NAME\`](https://www.npmjs.com/package/$NAME) |"
            done
            for dir in $CRATE_DIRS; do
              NAME=$(grep -m1 '^name' "$dir/Cargo.toml" | sed -E 's/name *= *"(.*)"/\1/')
              echo "| crates.io | [\`$NAME\`](https://crates.io/crates/$NAME) |"
            done
            for dir in $PYTHON_PACKAGE_DIRS; do
              NAME=$(python3 -c "import tomllib; print(tomllib.load(open('$dir/pyproject.toml','rb'))['project']['name'])")
              echo "| PyPI | [\`$NAME\`](https://pypi.org/project/$NAME/) |"
            done
            echo ""
            if [[ "$VERSION" == *-* ]]; then
              echo "> **Prerelease.** npm packages publish under the \`next\` dist-tag — install with \`npm install @constellation-network/metagraph-sdk@next\`. For PyPI use \`pip install --pre constellation-metagraph-sdk\`; for crates.io pin the exact version (\`= $VERSION\`)."
              echo ""
            fi
            echo "_Go and Java signing SDKs are not part of this unified release; see \`packages/{go,java}\`._"
          } > "$BODY"
          echo "body_path=$BODY" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SDK v${{ needs.version-check.outputs.version }}
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.version-check.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
