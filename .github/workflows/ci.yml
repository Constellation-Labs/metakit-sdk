name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      python: ${{ steps.filter.outputs.python }}
      rust: ${{ steps.filter.outputs.rust }}
      go: ${{ steps.filter.outputs.go }}
      java: ${{ steps.filter.outputs.java }}
      shared: ${{ steps.filter.outputs.shared }}
      jlvm_core: ${{ steps.filter.outputs.jlvm_core }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'packages/typescript/**'
              - 'packages/typescript-core/**'
              - 'packages/typescript-jlvm/**'
              - 'package.json'
              - 'package-lock.json'
            python:
              - 'packages/python/**'
            rust:
              - 'packages/rust/**'
            go:
              - 'packages/go/**'
            java:
              - 'packages/java/**'
            shared:
              - 'shared/**'
            jlvm_core:
              - 'rust/jlvm-core/**'
              - 'rust/poseidon-bn254/**'
              - 'rust/zk-shielded/**'

  typescript:
    needs: changes
    if: ${{ needs.changes.outputs.typescript == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace
        run: npm ci

      # Build BEFORE test, in dependency order. The `workspaces` array is
      # core -> jlvm -> metagraph-sdk, and `--workspaces` runs in that order;
      # metagraph-sdk's type-check + tests resolve metagraph-sdk-core's emitted
      # types, so core must be built first.
      - name: Build (all workspaces, dep order)
        run: npm run build --workspaces

      - name: Lint (all workspaces)
        run: npm run lint --workspaces

      - name: Format check (all workspaces)
        run: npm run format:check --workspaces

      - name: Test (all workspaces, with coverage)
        run: npm test --workspaces -- --coverage

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v5
        with:
          files: packages/typescript-core/coverage/lcov.info,packages/typescript-jlvm/coverage/lcov.info,packages/typescript/coverage/lcov.info
          flags: typescript
          fail_ci_if_error: false

  python:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: packages/python/pyproject.toml

      - name: Install dependencies
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: packages/python
        run: ruff check src tests

      - name: Format check with black
        working-directory: packages/python
        run: black --check src tests

      - name: Import sort check with isort
        working-directory: packages/python
        run: isort --check-only src tests

      - name: Type check with mypy
        working-directory: packages/python
        run: mypy src

      - name: Test with pytest
        working-directory: packages/python
        run: pytest --cov=constellation_sdk --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: packages/python/coverage.xml
          flags: python
          fail_ci_if_error: false

  rust:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            packages/rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/rust/Cargo.lock') }}

      - name: Check formatting
        working-directory: packages/rust
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: packages/rust
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: packages/rust
        run: cargo test

  go:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.18', '1.21', '1.22']
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: packages/go/go.sum

      - name: Download dependencies
        working-directory: packages/go
        run: go mod download

      - name: Vet
        working-directory: packages/go
        run: go vet ./...

      - name: Test
        working-directory: packages/go
        run: go test -v ./...

  java:
    needs: changes
    if: ${{ needs.changes.outputs.java == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['11', '17', '21']
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
          cache: 'maven'

      - name: Test
        working-directory: packages/java
        run: mvn test

  jlvm-core:
    needs: changes
    if: ${{ needs.changes.outputs.jlvm_core == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/jlvm-core/target/
          key: ${{ runner.os }}-cargo-jlvm-${{ hashFiles('rust/jlvm-core/Cargo.lock') }}

      # jlvm-core lives outside packages/ and is not exercised by the `rust` job
      # (which tests packages/rust, the signing SDK). Guard so this is a no-op on
      # refs/pushes where the crate isn't present yet (e.g. dev before the ZK
      # stack lands), then becomes a real gate once it is.
      - name: Format, lint, and test jlvm-core (+ poseidon-bn254)
        run: |
          if [ ! -f rust/jlvm-core/Cargo.toml ]; then
            echo "rust/jlvm-core not present on this ref; skipping"
            exit 0
          fi
          ( cd rust/jlvm-core && cargo fmt --all -- --check && cargo clippy --all-targets -- -D warnings && cargo test )
          if [ -f rust/poseidon-bn254/Cargo.toml ]; then
            ( cd rust/poseidon-bn254 && cargo test )
          fi
          # The confidential-transfer (zk-shielded) + confidential-state (zk-jlvm-shielded)
          # libs carry the shielded constraint systems (nullifier uniqueness, per-asset
          # conservation; membership ∧ jlvm-core effect ∧ nullifier ∧ commitment) + their
          # native vectors. Test the LIBs only: the `program`/`script` crates need the SP1
          # (succinct) toolchain, which this job doesn't install. Guarded so each is a no-op
          # until its crate lands.
          if [ -f rust/zk-shielded/lib/Cargo.toml ]; then
            ( cd rust/zk-shielded && cargo test -p constellation-metagraph-sdk-confidential-transfer-lib )
          fi
          if [ -f rust/zk-jlvm-shielded/lib/Cargo.toml ]; then
            ( cd rust/zk-jlvm-shielded && cargo test -p constellation-metagraph-sdk-confidential-state-lib )
          fi

  # Catch publish-time failures (manifest errors, packaging mistakes, the
  # verify build) on every PR instead of on the release tag — the lesson from
  # metakit's Maven release failing on scaladoc only at publish time. Mirrors
  # what .github/workflows/release.yml runs for real. See docs/RELEASING.md.
  publish-dry-run:
    needs: changes
    if: ${{ needs.changes.outputs.typescript == 'true' || needs.changes.outputs.rust == 'true' || needs.changes.outputs.jlvm_core == 'true' || needs.changes.outputs.shared == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: npm pack all workspaces (build must succeed)
        run: |
          npm ci
          npm run build --workspaces
          npm pack --workspaces

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/poseidon-bn254/target/
            rust/jlvm-core/target/
            packages/rust/target/
          key: ${{ runner.os }}-cargo-publish-dry-run-${{ hashFiles('rust/jlvm-core/Cargo.toml', 'rust/poseidon-bn254/Cargo.toml', 'packages/rust/Cargo.toml') }}

      # Same dependency order as release.yml. jlvm-core needs special handling:
      # its poseidon-bn254 path dependency is rewritten to a registry dependency
      # at packaging time, and cargo (even `cargo package --no-verify`) refuses
      # to resolve a registry dependency that has never been published. Until
      # poseidon-bn254's first real publish we fall back to manifest-only checks
      # (`cargo package --list` parses/validates the manifest and computes the
      # file list) plus an assert that the path dep carries the `version` key
      # publishing requires. The full dry-run activates automatically once the
      # dependency exists on crates.io.
      - name: cargo publish --dry-run (dependency order)
        run: |
          for dir in rust/poseidon-bn254 rust/jlvm-core packages/rust; do
            NAME=$(grep -m1 '^name' "$dir/Cargo.toml" | sed -E 's/name *= *"(.*)"/\1/')
            echo "::group::cargo publish --dry-run $NAME ($dir)"
            if out=$(cd "$dir" && cargo publish --dry-run 2>&1); then
              echo "$out" | tail -n 5
            elif echo "$out" | grep -q 'no matching package named'; then
              echo "$out" | tail -n 5
              echo "::notice file=$dir/Cargo.toml::$NAME: full dry-run skipped — a path dependency is not yet published on crates.io, so cargo cannot rewrite it into a registry dependency. Falling back to manifest-only checks; this becomes a full dry-run automatically after the dependency's first publish (docs/RELEASING.md)."
              ( cd "$dir" && cargo package --list > /dev/null )
              grep -Eq 'path *= *"\.\./poseidon-bn254" *, *version *=' "$dir/Cargo.toml" || {
                echo "::error file=$dir/Cargo.toml::path dependency on poseidon-bn254 is missing the 'version' key required by cargo publish"
                exit 1
              }
            else
              echo "$out"
              exit 1
            fi
            echo "::endgroup::"
          done

  cross-language:
    needs: [typescript, python, rust, go, java]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/python/pyproject.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache-dependency-path: packages/go/go.sum

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install TypeScript dependencies (workspace)
        run: npm ci

      - name: Install Python dependencies
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Go dependencies
        working-directory: packages/go
        run: go mod download

      - name: Run cross-language tests (TypeScript)
        working-directory: packages/typescript-core
        run: npm test -- --testPathPatterns=cross-language

      - name: Run cross-language tests (Python)
        working-directory: packages/python
        run: pytest tests/test_cross_language.py -v

      - name: Run cross-language tests (Rust)
        working-directory: packages/rust
        run: cargo test --test cross_language

      - name: Run cross-language tests (Go)
        working-directory: packages/go
        run: go test -v -run CrossLanguage

      - name: Run cross-language tests (Java)
        working-directory: packages/java
        run: mvn test -Dtest=CrossLanguageTest

  all-checks-pass:
    needs: [typescript, python, rust, go, java, jlvm-core, publish-dry-run, cross-language]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typescript.result }}" == "failure" ||
                "${{ needs.python.result }}" == "failure" ||
                "${{ needs.rust.result }}" == "failure" ||
                "${{ needs.go.result }}" == "failure" ||
                "${{ needs.java.result }}" == "failure" ||
                "${{ needs.jlvm-core.result }}" == "failure" ||
                "${{ needs.publish-dry-run.result }}" == "failure" ||
                "${{ needs.cross-language.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All checks passed"