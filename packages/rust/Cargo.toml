[package]
name = "constellation-metagraph-sdk"
version = "1.8.0-rc.7"
edition = "2021"
authors = ["Constellation Network"]
description = "Rust SDK for signing data and currency transactions on Constellation Network metagraphs built with metakit"
license = "Apache-2.0"
repository = "https://github.com/Constellation-Labs/metakit-sdk"
homepage = "https://github.com/Constellation-Labs/metakit-sdk"
documentation = "https://docs.rs/constellation-metagraph-sdk"
keywords = ["constellation", "metagraph", "ecdsa", "secp256k1", "secp256r1"]
categories = ["cryptography", "api-bindings"]
readme = "README.md"
rust-version = "1.70"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
# Offline kernel — canonicalization, hashing, binary encoding,
# committed-roots codecs, and secp256k1/secp256r1 signing. The base crate
# re-exports every module from here so `constellation_sdk::*` paths resolve
# unchanged (see src/lib.rs).
constellation-metagraph-sdk-core = { path = "../rust-core", version = "1.8.0-rc.7" }

# Cryptography (secp256k1) — still used directly by currency_transaction.
secp256k1 = { version = "0.29", features = ["rand", "global-context"] }
sha2 = "0.10"
hex = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"

# Random number generation
rand = "0.8"

# Additional utilities
num-bigint = "0.4"
regex = "1.0"

# Network (optional)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
tokio = { version = "1", features = ["rt-multi-thread"], optional = true }

[features]
default = []
# Enables P-256 (secp256r1) signing — TPM-native curve. Delegates to the
# core crate's `r1` feature (the p256 / ecdsa / elliptic-curve dep tree and
# the `r1` module now live in constellation-metagraph-sdk-core).
r1 = ["constellation-metagraph-sdk-core/r1"]
# Enables the optional metagraph network client.
network = ["dep:reqwest", "dep:tokio"]

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
pretty_assertions = "1.4"

[lib]
name = "constellation_sdk"
path = "src/lib.rs"

[[test]]
name = "integration"
path = "tests/integration.rs"

[[test]]
name = "cross_language"
path = "tests/cross_language.rs"

[[test]]
name = "currency_transaction"
path = "tests/currency_transaction.rs"
