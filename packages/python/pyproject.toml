# Shared tooling configuration for the Python tier split.
#
# This file intentionally declares NO [build-system] or [project] table: it is not
# an installable distribution. The three real distributions live in ./core, ./main,
# and ./jlvm, each with its own pyproject.toml. This top-level file exists only so
# black / isort / ruff / mypy resolve a single, consistent configuration (line
# length 100, black import profile, strict typing) when run from packages/python
# across the tiered directories.

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["constellation_metagraph", "constellation_sdk"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint.per-file-ignores]
# Package __init__.py files intentionally re-export their tier's public API.
# ``main``'s __all__ is assembled dynamically, which ruff cannot trace back to the
# re-export imports, so scope the unused-import rule off for package roots.
"__init__.py" = ["F401"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
namespace_packages = true
explicit_package_bases = true
mypy_path = ["core/src", "main/src", "jlvm/src"]

[[tool.mypy.overrides]]
module = ["ecdsa", "ecdsa.*"]
ignore_missing_imports = true
